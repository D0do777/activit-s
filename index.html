<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mes Objectifs</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>Mes Objectifs</h1>
</header>

<main>

<section id="todayPage" class="page active">

<div id="taskList"></div>

</section>

<section id="addPage" class="page">

<h2>Ajouter un objectif</h2>

<input id="title" placeholder="Titre">

<input id="subtitle" placeholder="Description">

<select id="icon">

<option>📚</option>
<option>🏃</option>
<option>💻</option>
<option>🧠</option>
<option>📖</option>
<option>💪</option>
<option>🧘</option>
<option>🎨</option>
<option>🎵</option>
<option>🍎</option>
<option>💧</option>
<option>🛏</option>
<option>📱</option>

</select>

<input type="time" id="time" placeholder="Heure">

<div class="days">

<button class="day" data-day="1">L</button>
<button class="day" data-day="2">M</button>
<button class="day" data-day="3">M</button>
<button class="day" data-day="4">J</button>
<button class="day" data-day="5">V</button>
<button class="day" data-day="6">S</button>
<button class="day" data-day="0">D</button>

</div>

<button class="addBtn" onclick="addTask()">Ajouter l'objectif</button>

</section>

<section id="statsPage" class="page">

<canvas id="statsChart"></canvas>

</section>

</main>

<nav>

<button onclick="showPage('todayPage')">🏠</button>
<button onclick="showPage('addPage')">➕</button>
<button onclick="showPage('statsPage')">📊</button>

</nav>

<script src="js/storage.js"></script>
<script src="js/sounds.js"></script>
<script src="js/tasks.js"></script>
<script src="js/stats.js"></script>
<script src="js/app.js"></script>

</body>
</html>
